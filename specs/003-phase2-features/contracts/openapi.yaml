openapi: 3.0.3
info:
  title: Todo App API - Phase 2
  description: API for managing tasks with due dates, priorities, and pinning.
  version: 2.0.0
servers:
  - url: /api/{user_id}/tasks
    variables:
      user_id:
        default: default-user
        description: Authenticated User ID
paths:
  /:
    get:
      summary: List tasks
      description: Returns a list of tasks for the user, sorted by pinned first and then priority.
      responses:
        '200':
          description: A list of tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskList'
    post:
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
  /{task_id}:
    put:
      summary: Update a task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdate'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
    delete:
      summary: Delete a task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Task deleted
components:
  schemas:
    Task:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        completed:
          type: boolean
        due_date:
          type: string
          format: date-time
          nullable: true
        priority:
          type: string
          enum: [high, medium, low]
        is_pinned:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TaskCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        due_date:
          type: string
          format: date-time
          nullable: true
        priority:
          type: string
          enum: [high, medium, low]
          default: medium
        is_pinned:
          type: boolean
          default: false
    TaskUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        completed:
          type: boolean
        due_date:
          type: string
          format: date-time
          nullable: true
        priority:
          type: string
          enum: [high, medium, low]
        is_pinned:
          type: boolean
    TaskList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        count:
          type: integer
